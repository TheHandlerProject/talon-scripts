version: "3.8"

services:
  knox-browser:
    build: ./knox-browser
    container_name: knox-browser
    restart: unless-stopped
    ports:
      - "127.0.0.1:8767:8767"   # localhost only — Knox accesses via Ollama on same host
    volumes:
      - /home/neo/.knox-vault:/home/neo/.knox-vault
      - /home/neo/knox-logs:/home/neo/knox-logs
      - /var/www/html:/var/www/html
    environment:
      - PYTHONUNBUFFERED=1
    shm_size: "1gb"             # Playwright needs this for Chromium
    security_opt:
      - seccomp:unconfined      # Required for Chromium sandbox
