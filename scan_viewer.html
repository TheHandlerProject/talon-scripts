<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Scan Viewer</title>
<style>
  :root {
    --bg:#1a1a1a; --panel:#242424; --border:#404040;
    --accent:#f0a500; --ok:#78c878; --danger:#e05050;
    --warn:#e8c840; --dim:#888; --text:#e8e8e8;
    --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  header h1 { font-size:16px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); }
  .hdr-right { display:flex; gap:8px; align-items:center; }
  .btn { background:transparent; border:1px solid var(--dim); color:var(--dim); padding:5px 14px; font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all 0.15s; }
  .btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .btn:disabled { opacity:0.35; cursor:not-allowed; }
  .btn.ok { border-color:var(--ok); color:var(--ok); }
  .btn.ok:hover:not(:disabled) { background:rgba(120,200,120,0.08); }
  .btn.warn { border-color:var(--warn); color:var(--warn); }
  .btn.danger { border-color:var(--danger); color:var(--danger); }

  /* Main split layout */
  .main { display:grid; grid-template-columns:1fr 360px; flex:1; overflow:hidden; gap:1px; background:var(--border); }

  /* 3D canvas */
  .viewer-wrap { background:#050709; position:relative; }
  canvas#canvas { width:100%; height:100%; display:block; }
  .viewer-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .viewer-hint { font-family:var(--mono); font-size:11px; color:var(--dim); text-align:center; line-height:1.8; }
  #ptCount { position:absolute; bottom:10px; left:12px; font-family:var(--mono); font-size:11px; color:var(--dim); background:rgba(0,0,0,0.5); padding:2px 8px; border:1px solid var(--border); }

  /* Right panel */
  .right-panel { background:var(--panel); display:flex; flex-direction:column; overflow:hidden; }

  /* Live feed */
  .feed-section { border-bottom:1px solid var(--border); flex-shrink:0; }
  .section-hdr { padding:7px 12px; font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .live-feed { position:relative; background:#000; }
  .live-feed img { width:100%; display:block; max-height:200px; object-fit:cover; }
  .live-dot { position:absolute; top:6px; right:8px; width:8px; height:8px; border-radius:50%; background:var(--danger); box-shadow:0 0 6px var(--danger); }
  .live-dot.on { background:var(--ok); box-shadow:0 0 8px var(--ok); }

  /* Capture controls */
  .capture-section { padding:12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .capture-btn { width:100%; padding:14px; font-family:var(--sans); font-size:16px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:transparent; border:2px solid var(--warn); color:var(--warn); cursor:pointer; transition:all 0.15s; margin-bottom:10px; }
  .capture-btn:hover:not(:disabled) { background:rgba(232,200,64,0.1); }
  .capture-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .capture-btn.capturing { border-color:var(--ok); color:var(--ok); animation:pulse 0.5s ease-in-out; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .frame-counter { font-family:var(--mono); font-size:28px; color:var(--accent); text-align:center; line-height:1; margin-bottom:4px; }
  .frame-label { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); text-align:center; margin-bottom:10px; }
  .action-row { display:flex; gap:6px; }
  .action-row .btn { flex:1; text-align:center; }

  /* Auto scan controls */
  .auto-section { padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .slider-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .slider-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim); width:64px; flex-shrink:0; }
  input[type=range] { flex:1; accent-color:var(--accent); height:3px; }
  .slider-val { font-family:var(--mono); font-size:12px; color:var(--text); width:38px; text-align:right; flex-shrink:0; }

  /* Thumbnail strip */
  .thumb-section { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  .thumb-grid { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:3px; padding:8px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .thumb { position:relative; aspect-ratio:4/3; background:#000; overflow:hidden; border:1px solid var(--border); cursor:pointer; }
  .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb .idx { position:absolute; bottom:2px; right:4px; font-family:var(--mono); font-size:9px; color:rgba(255,255,255,0.6); }
  .empty-thumbs { padding:20px; text-align:center; font-size:11px; color:var(--dim); letter-spacing:0.1em; }

  /* Status bar */
  .status-bar { padding:7px 12px; border-top:1px solid var(--border); font-family:var(--mono); font-size:11px; color:var(--dim); flex-shrink:0; min-height:32px; display:flex; align-items:center; }
  .status-bar.ok { color:var(--ok); }
  .status-bar.err { color:var(--danger); }
  .status-bar.working { color:var(--warn); }
</style>
</head>
<body>

<header>
  <h1>3D Scan Station</h1>
  <div class="hdr-right">
    <span id="ptCount2" style="font-family:var(--mono);font-size:11px;color:var(--dim)">—</span>
    <button class="btn" onclick="window.history.back()">← Dashboard</button>
    <button class="btn" id="btnDownload" onclick="downloadPly()" disabled>⬇ .PLY</button>
  </div>
</header>

<div class="main">

  <!-- 3D VIEWER -->
  <div class="viewer-wrap">
    <canvas id="canvas"></canvas>
    <div class="viewer-overlay" id="viewerHint">
      <div class="viewer-hint">
        Capture frames from the right panel<br>
        then press <span style="color:var(--ok)">Reconstruct</span> to build the 3D model.<br><br>
        <span style="color:var(--dim);font-size:10px">Drag to orbit · Scroll to zoom</span>
      </div>
    </div>
    <div id="ptCount"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Live feed -->
    <div class="feed-section">
      <div class="section-hdr">
        Live Feed
        <div class="live-dot" id="liveDot"></div>
      </div>
      <div class="live-feed">
        <img id="liveFeed" src="/stream" alt="Live">
      </div>
    </div>

    <!-- Capture controls -->
    <div class="capture-section">
      <div class="frame-counter" id="frameCounter">0</div>
      <div class="frame-label">frames captured</div>
      <button class="capture-btn" id="btnCapture" onclick="captureFrame()">📸 Capture Frame</button>
      <div class="action-row">
        <button class="btn warn" id="btnAutoScan" onclick="toggleAutoScan()">▶ Auto</button>
        <button class="btn ok" id="btnReconstruct" onclick="startReconstruct()" disabled>⟳ Reconstruct</button>
        <button class="btn danger" onclick="clearFrames()">✕ Clear</button>
      </div>
    </div>

    <!-- Auto scan sliders -->
    <div class="auto-section">
      <div class="slider-row">
        <span class="slider-label">Frames</span>
        <input type="range" id="autoCount" min="5" max="200" value="20" step="1" oninput="document.getElementById('autoCountVal').textContent=this.value">
        <span class="slider-val" id="autoCountVal">20</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Interval</span>
        <input type="range" id="autoInterval" min="0.2" max="5" value="0.5" step="0.1" oninput="document.getElementById('autoIntervalVal').textContent=this.value+'s'">
        <span class="slider-val" id="autoIntervalVal">0.5s</span>
      </div>
    </div>

    <!-- Thumbnails -->
    <div class="thumb-section">
      <div class="section-hdr">Captured Frames</div>
      <div class="thumb-grid" id="thumbGrid">
        <div class="empty-thumbs" id="emptyThumbs" style="grid-column:1/-1">No frames yet</div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">Ready</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Three.js setup ────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
const cam3d = new THREE.PerspectiveCamera(60, 1, 0.001, 1000);
cam3d.position.set(0, 1, 3);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
scene.add(new THREE.GridHelper(4, 20, 0x333333, 0x222222));

function resize3d() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  cam3d.aspect = w / h;
  cam3d.updateProjectionMatrix();
}
window.addEventListener('resize', resize3d);
resize3d();

let isDrag=false, lastX=0, lastY=0, theta=0.3, phi=1.1, radius=3;
canvas.addEventListener('mousedown', e=>{isDrag=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup', ()=>isDrag=false);
window.addEventListener('mousemove', e=>{
  if(!isDrag)return;
  theta-=(e.clientX-lastX)*0.01; phi-=(e.clientY-lastY)*0.01;
  phi=Math.max(0.05,Math.min(Math.PI-0.05,phi));
  lastX=e.clientX;lastY=e.clientY;
});
canvas.addEventListener('wheel', e=>{ radius=Math.max(0.3,radius+e.deltaY*0.005); });
canvas.addEventListener('touchstart', e=>{isDrag=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;});
canvas.addEventListener('touchend', ()=>isDrag=false);
canvas.addEventListener('touchmove', e=>{
  theta-=(e.touches[0].clientX-lastX)*0.01; phi-=(e.touches[0].clientY-lastY)*0.01;
  phi=Math.max(0.05,Math.min(Math.PI-0.05,phi));
  lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
});

(function animate(){
  requestAnimationFrame(animate);
  cam3d.position.set(
    radius*Math.sin(phi)*Math.sin(theta),
    radius*Math.cos(phi),
    radius*Math.sin(phi)*Math.cos(theta)
  );
  cam3d.lookAt(0,0,0);
  renderer.render(scene,cam3d);
})();

// ── State ─────────────────────────────────────────────────────────────────
let capturedCount = 0;
let autoRunning   = false;
let autoTimer     = null;
let currentScanId = null;
let reconPolling  = null;

// ── Live feed reconnect ───────────────────────────────────────────────────
let lastFrame = Date.now();
const liveFeed = document.getElementById('liveFeed');
liveFeed.addEventListener('load', ()=>{ lastFrame=Date.now(); document.getElementById('liveDot').classList.add('on'); });
liveFeed.addEventListener('error', ()=>{ setTimeout(()=>{ liveFeed.src='/stream?t='+Date.now(); },2000); });
setInterval(()=>{ if(Date.now()-lastFrame>5000){ liveFeed.src='/stream?t='+Date.now(); lastFrame=Date.now(); } },2000);

// ── Status helper ─────────────────────────────────────────────────────────
function setStatus(msg, type='') {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' '+type : '');
}

// ── Capture ───────────────────────────────────────────────────────────────
function captureFrame() {
  const btn = document.getElementById('btnCapture');
  btn.disabled = true;
  btn.classList.add('capturing');
  btn.textContent = '⏳ Capturing...';

  fetch('/api/scan/capture', {method:'POST'})
    .then(r=>r.json())
    .then(d=>{
      if(d.error){ setStatus(d.error, 'err'); return; }
      capturedCount = d.frames_captured;
      document.getElementById('frameCounter').textContent = capturedCount;
      if(capturedCount >= 3) document.getElementById('btnReconstruct').disabled = false;
      addThumbnail(d.thumbnail, capturedCount);
      setStatus(`Frame ${capturedCount} captured`);
    })
    .catch(e=>setStatus('Capture failed: '+e, 'err'))
    .finally(()=>{
      btn.disabled = false;
      btn.classList.remove('capturing');
      btn.textContent = '📸 Capture Frame';
    });
}

function addThumbnail(dataUrl, idx) {
  const grid = document.getElementById('thumbGrid');
  const empty = document.getElementById('emptyThumbs');
  if(empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'thumb';
  if(dataUrl){
    const img = document.createElement('img');
    img.src = dataUrl;
    div.appendChild(img);
  }
  const idxEl = document.createElement('div');
  idxEl.className = 'idx';
  idxEl.textContent = '#'+idx;
  div.appendChild(idxEl);
  grid.appendChild(div);
  grid.scrollTop = grid.scrollHeight;
}

// ── Auto scan ─────────────────────────────────────────────────────────────
function toggleAutoScan() {
  if(autoRunning){ stopAutoScan(); return; }
  startAutoScan();
}

function startAutoScan() {
  const count    = parseInt(document.getElementById('autoCount').value);
  const interval = parseFloat(document.getElementById('autoInterval').value) * 1000;
  autoRunning = true;
  document.getElementById('btnAutoScan').textContent = '■ Stop';
  document.getElementById('btnAutoScan').classList.add('danger');
  document.getElementById('btnCapture').disabled = true;
  setStatus('Auto scanning...', 'working');

  let remaining = count;
  function tick(){
    if(!autoRunning || remaining <= 0){ stopAutoScan(); return; }
    captureFrameSilent(()=>{ remaining--; if(remaining>0) autoTimer=setTimeout(tick,interval); else stopAutoScan(); });
  }
  tick();
}

function stopAutoScan() {
  autoRunning = false;
  clearTimeout(autoTimer);
  document.getElementById('btnAutoScan').textContent = '▶ Auto';
  document.getElementById('btnAutoScan').classList.remove('danger');
  document.getElementById('btnCapture').disabled = false;
  setStatus(`Auto scan complete — ${capturedCount} frames`);
}

function captureFrameSilent(cb) {
  fetch('/api/scan/capture', {method:'POST'})
    .then(r=>r.json())
    .then(d=>{
      if(d.error){ setStatus(d.error,'err'); stopAutoScan(); return; }
      capturedCount = d.frames_captured;
      document.getElementById('frameCounter').textContent = capturedCount;
      if(capturedCount >= 3) document.getElementById('btnReconstruct').disabled = false;
      addThumbnail(d.thumbnail, capturedCount);
      cb && cb();
    })
    .catch(()=>{ stopAutoScan(); });
}

// ── Clear ─────────────────────────────────────────────────────────────────
function clearFrames() {
  stopAutoScan();
  fetch('/api/scan/clear', {method:'POST'}).then(()=>{
    capturedCount = 0;
    document.getElementById('frameCounter').textContent = '0';
    document.getElementById('btnReconstruct').disabled = true;
    document.getElementById('btnDownload').disabled = true;
    document.getElementById('thumbGrid').innerHTML = '<div class="empty-thumbs" id="emptyThumbs" style="grid-column:1/-1">No frames yet</div>';
    scene.children = scene.children.filter(c=>!(c instanceof THREE.Points));
    document.getElementById('viewerHint').style.display='flex';
    document.getElementById('ptCount').textContent='';
    document.getElementById('ptCount2').textContent='—';
    currentScanId = null;
    setStatus('Cleared');
  });
}

// ── Reconstruct ───────────────────────────────────────────────────────────
function startReconstruct() {
  document.getElementById('btnReconstruct').disabled = true;
  setStatus('Starting reconstruction...', 'working');

  fetch('/api/scan/reconstruct', {method:'POST'})
    .then(r=>r.json())
    .then(d=>{
      if(!d.ok){ setStatus('Error: '+(d.error||'unknown'), 'err'); document.getElementById('btnReconstruct').disabled=false; return; }
      currentScanId = d.scan_id;
      setStatus('Reconstructing... ('+d.frames+' frames)', 'working');
      pollReconStatus();
    })
    .catch(e=>{ setStatus('Failed: '+e,'err'); document.getElementById('btnReconstruct').disabled=false; });
}

function pollReconStatus() {
  if(!currentScanId) return;
  fetch('/api/scan/'+currentScanId+'/status')
    .then(r=>r.json())
    .then(d=>{
      if(d.status === 'complete'){
        setStatus('✓ Reconstruction complete — '+d.point_count.toLocaleString()+' points', 'ok');
        document.getElementById('btnReconstruct').disabled = false;
        document.getElementById('btnDownload').disabled = false;
        loadAndDisplay(currentScanId);
      } else if(d.status === 'error'){
        setStatus('✕ '+d.error, 'err');
        document.getElementById('btnReconstruct').disabled = false;
      } else {
        setStatus('Reconstructing...', 'working');
        setTimeout(pollReconStatus, 1500);
      }
    })
    .catch(()=>setTimeout(pollReconStatus, 2000));
}

// ── PLY loader ────────────────────────────────────────────────────────────
function loadAndDisplay(scanId) {
  setStatus('Loading point cloud...', 'working');
  fetch('/api/scan/'+scanId+'/pointcloud')
    .then(r=>r.arrayBuffer())
    .then(buf=>{
      const data = parsePLY(buf);
      displayPointCloud(data);
      const label = data.vertexCount.toLocaleString()+' pts';
      document.getElementById('ptCount').textContent = label;
      document.getElementById('ptCount2').textContent = label;
      document.getElementById('viewerHint').style.display='none';
      setStatus('Loaded '+label, 'ok');
    })
    .catch(e=>setStatus('Load failed: '+e,'err'));
}

function parsePLY(buffer) {
  const headerText = new TextDecoder().decode(buffer.slice(0,2048));
  const lines = headerText.split('\n');
  let vertexCount=0, isBinary=false, headerByteLen=0;
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith('element vertex')) vertexCount=parseInt(lines[i].split(' ')[2]);
    if(lines[i].includes('binary')) isBinary=true;
    if(lines[i].trim()==='end_header'){
      headerByteLen = new TextEncoder().encode(lines.slice(0,i+1).join('\n')+'\n').length;
      break;
    }
  }
  const positions = new Float32Array(vertexCount*3);
  const colors    = new Float32Array(vertexCount*3);
  if(isBinary){
    const stride=15, view=new DataView(buffer,headerByteLen);
    for(let i=0;i<vertexCount;i++){
      const o=i*stride;
      positions[i*3]=view.getFloat32(o,true); positions[i*3+1]=view.getFloat32(o+4,true); positions[i*3+2]=view.getFloat32(o+8,true);
      colors[i*3]=view.getUint8(o+12)/255; colors[i*3+1]=view.getUint8(o+13)/255; colors[i*3+2]=view.getUint8(o+14)/255;
    }
  } else {
    const ascii=new TextDecoder().decode(buffer).split('end_header\n')[1].trim().split('\n');
    for(let i=0;i<vertexCount;i++){
      const p=ascii[i].trim().split(/\s+/);
      positions[i*3]=parseFloat(p[0]); positions[i*3+1]=parseFloat(p[1]); positions[i*3+2]=parseFloat(p[2]);
      colors[i*3]=p[3]?parseInt(p[3])/255:0.94; colors[i*3+1]=p[4]?parseInt(p[4])/255:0.65; colors[i*3+2]=p[5]?parseInt(p[5])/255:0.0;
    }
  }
  // Fix black points
  for(let i=0;i<colors.length;i+=3){
    if(colors[i]===0&&colors[i+1]===0&&colors[i+2]===0){colors[i]=0.94;colors[i+1]=0.65;colors[i+2]=0.0;}
  }
  return {positions,colors,vertexCount};
}

function displayPointCloud(data) {
  scene.children = scene.children.filter(c=>!(c instanceof THREE.Points));
  // Center + normalize
  const p=data.positions;
  let mx=Infinity,my=Infinity,mz=Infinity,Mx=-Infinity,My=-Infinity,Mz=-Infinity;
  for(let i=0;i<p.length;i+=3){mx=Math.min(mx,p[i]);Mx=Math.max(Mx,p[i]);my=Math.min(my,p[i+1]);My=Math.max(My,p[i+1]);mz=Math.min(mz,p[i+2]);Mz=Math.max(Mz,p[i+2]);}
  const cx=(mx+Mx)/2,cy=(my+My)/2,cz=(mz+Mz)/2;
  const sc=2.0/Math.max(Mx-mx,My-my,Mz-mz,0.0001);
  for(let i=0;i<p.length;i+=3){p[i]=(p[i]-cx)*sc;p[i+1]=(p[i+1]-cy)*sc;p[i+2]=(p[i+2]-cz)*sc;}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(p,3));
  geo.setAttribute('color',new THREE.BufferAttribute(data.colors,3));
  geo.computeBoundingSphere();
  const mat=new THREE.PointsMaterial({size:0.015,vertexColors:true});
  scene.add(new THREE.Points(geo,mat));
  radius=geo.boundingSphere.radius*3.5;
}

function downloadPly() {
  if(!currentScanId) return;
  window.location='/api/scan/'+currentScanId+'/pointcloud';
}

// Space = capture
document.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); if(!autoRunning) captureFrame(); } });
</script>
</body>
</html>
